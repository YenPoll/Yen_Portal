<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Framework comparing what AI does versus what the human decision-maker does, with cited source</title>
<desc>A two-column comparison: AI accelerates information and analysis, while the human retains judgment, accountability, and the final call. Includes a cited statistic from Deloitte's 2026 Global Human Capital Trends report.</desc>
<rect x="0" y="0" width="680" height="470" fill="#0F0F0F"/>

<text x="40" y="34" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">"60% of executives now regularly use AI to support their decisions."</text>
<text x="40" y="52" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Source: Deloitte Insights, 2026 Global Human Capital Trends</text>

<rect x="40" y="72" width="290" height="360" rx="10" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="0.75"/>
<text x="60" y="101" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7FA8D9">What AI does</text>

<g font-family="Arial, sans-serif" font-size="13" fill="#E5E5E5">
<circle cx="66" cy="147" r="3" fill="#7FA8D9"/><text x="78" y="152">Scans data for patterns</text>
<circle cx="66" cy="179" r="3" fill="#7FA8D9"/><text x="78" y="184">Models scenarios fast</text>
<circle cx="66" cy="211" r="3" fill="#7FA8D9"/><text x="78" y="216">Flags anomalies early</text>
<circle cx="66" cy="243" r="3" fill="#7FA8D9"/><text x="78" y="248">Drafts reports, dashboards</text>
<circle cx="66" cy="275" r="3" fill="#7FA8D9"/><text x="78" y="280">Surfaces options, fast</text>
</g>
<text x="60" y="337" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">Speed and scale</text>
<text x="60" y="359" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7FA8D9">Minutes, not hours</text>

<rect x="350" y="72" width="290" height="360" rx="10" fill="#1A1A1A" stroke="#B8923F" stroke-width="1.25"/>
<text x="370" y="101" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#C89B3C">What I decide</text>

<g font-family="Arial, sans-serif" font-size="13" fill="#E5E5E5">
<circle cx="376" cy="147" r="3" fill="#C89B3C"/><text x="388" y="152">Which option to pursue</text>
<circle cx="376" cy="179" r="3" fill="#C89B3C"/><text x="388" y="184">What risk is worth taking</text>
<circle cx="376" cy="211" r="3" fill="#C89B3C"/><text x="388" y="216">How to handle the person, not just the number</text>
<circle cx="376" cy="243" r="3" fill="#C89B3C"/><text x="388" y="248">When to override the model</text>
<circle cx="376" cy="275" r="3" fill="#C89B3C"/><text x="388" y="280">Who's accountable for the outcome</text>
</g>
<text x="370" y="337" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">Judgment and accountability</text>
<text x="370" y="359" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C89B3C">Always human</text>

<text x="340" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">AI accelerates the information. The decision stays mine.</text>
</svg>
