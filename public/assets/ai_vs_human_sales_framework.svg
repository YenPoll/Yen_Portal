<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Framework comparing what AI does versus what the sales professional decides</title>
<desc>A two-column comparison for sales enablement: AI accelerates prospecting and forecasting, while the salesperson retains judgment on relationships, negotiation, and accountability. Includes a cited statistic from Salesforce.</desc>
<rect x="0" y="0" width="680" height="470" fill="#0F0F0F"/>

<text x="40" y="34" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">"87% of sales organizations now use AI for prospecting, forecasting, or lead scoring."</text>
<text x="40" y="52" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Source: Salesforce, State of Sales Report, 2026</text>

<rect x="40" y="72" width="290" height="360" rx="10" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="0.75"/>
<text x="60" y="101" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#7FA8D9">What AI does</text>
<g font-family="Arial, sans-serif" font-size="13" fill="#E5E5E5">
<circle cx="66" cy="147" r="3" fill="#7FA8D9"/><text x="78" y="152">Prioritizes and scores leads</text>
<circle cx="66" cy="179" r="3" fill="#7FA8D9"/><text x="78" y="184">Drafts outreach and follow-ups</text>
<circle cx="66" cy="211" r="3" fill="#7FA8D9"/><text x="78" y="216">Forecasts pipeline in real time</text>
<circle cx="66" cy="243" r="3" fill="#7FA8D9"/><text x="78" y="248">Flags at-risk deals early</text>
<circle cx="66" cy="275" r="3" fill="#7FA8D9"/><text x="78" y="280">Updates CRM automatically</text>
</g>
<text x="60" y="337" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">Impact</text>
<text x="60" y="359" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7FA8D9">More time selling</text>

<rect x="350" y="72" width="290" height="360" rx="10" fill="#1A1A1A" stroke="#B8923F" stroke-width="1.25"/>
<text x="370" y="101" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#C89B3C">What I decide</text>
<g font-family="Arial, sans-serif" font-size="13" fill="#E5E5E5">
<circle cx="376" cy="147" r="3" fill="#C89B3C"/><text x="388" y="152">Which relationship to prioritize</text>
<circle cx="376" cy="179" r="3" fill="#C89B3C"/><text x="388" y="184">How to negotiate terms</text>
<circle cx="376" cy="211" r="3" fill="#C89B3C"/><text x="388" y="216">When to walk away from a deal</text>
<circle cx="376" cy="243" r="3" fill="#C89B3C"/><text x="388" y="248">How to read a distributor's trust</text>
<circle cx="376" cy="275" r="3" fill="#C89B3C"/><text x="388" y="280">Who's accountable for the close</text>
</g>
<text x="370" y="337" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">Impact</text>
<text x="370" y="359" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C89B3C">The relationship</text>

<text x="340" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9CA3AF">AI moves the pipeline faster. I still close the relationship.</text>
</svg>
